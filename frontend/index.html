<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-size: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .btn {
            display: block;
            width: 100%;
            height: 100px;
            line-height: 100px;
            text-align: center;
            border: none;
            border-radius: 15px;
            font-size: 28px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        #assistantBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #assistantBtn.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1s infinite;
        }
        
        #sosBtn {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(245, 87, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0); }
        }
        
        #status {
            min-height: 100px;
            padding: 20px;
            border-radius: 15px;
            background: #f8f9fa;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
        }
        
        #status.error {
            background: #fff3f3;
            color: #dc3545;
            border: 2px solid #dc3545;
        }
        
        #status.success {
            background: #f0fff4;
            color: #28a745;
            border: 2px solid #28a745;
        }
        
        #status.processing {
            background: #fff8e6;
            color: #f5a623;
            border: 2px solid #f5a623;
        }
        
        .tip {
            font-size: 14px;
            color: white;
            opacity: 0.9;
            margin-top: 15px;
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 连接状态指示器 */
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            z-index: 100;
        }
        
        .connection-status.online {
            background: #28a745;
        }
        
        .connection-status.offline {
            background: #dc3545;
        }
        
        /* 退出登录按钮 */
        .logout-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            background: rgba(255,255,255,0.2);
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 100;
        }
        
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">退出登录</button>
    <div class="connection-status online" id="connectionStatus">已连接</div>
    
    <div class="container">
        <div class="header">
            <h1>老年智能助手</h1>
            <p>点击下方按钮，语音说出您的需求</p>
        </div>
        
        <div class="card">
            <div id="status">您好！我是您的智能助手小助。点击「智能助手」按钮，说出您想要做的事情，比如"我要去女儿家怎么走"。</div>
        </div>
        
        <button class="btn" id="assistantBtn">智能助手</button>
        <button class="btn" id="sosBtn">SOS紧急求助</button>
        
        <div class="tip">
            💡 提示：说话示例<br>
            "我要去女儿家怎么走"<br>
            "今天天气怎么样"<br>
            "我女儿的电话是多少"
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const API_BASE_URL = 'http://localhost:8000';
        const MAX_RECORD_TIME = 60000;  // 最长录音1分钟

        // ========== DOM元素 ==========
        const assistantBtn = document.getElementById('assistantBtn');
        const sosBtn = document.getElementById('sosBtn');
        const statusText = document.getElementById('status');
        const connectionStatus = document.getElementById('connectionStatus');

        // ========== 状态变量 ==========
        let recognition = null;
        let isListening = false;
        let currentPosition = null;
        let elderlyId = null;  // 从登录信息获取
        let userInfo = null;

        // ========== 登录检查 ==========
        function checkLogin() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
                return false;
            }
            
            elderlyId = parseInt(localStorage.getItem('elderlyId'));
            userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            
            if (!elderlyId) {
                window.location.href = 'login.html';
                return false;
            }
            
            // 显示欢迎信息
            if (userInfo.name) {
                document.querySelector('.header p').textContent = `您好，${userInfo.name}！点击下方按钮开始对话`;
            }
            
            return true;
        }
        
        // ========== 退出登录 ==========
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('elderlyId');
            localStorage.removeItem('userInfo');
            window.location.href = 'login.html';
        }

        // ========== 工具函数 ==========
        function updateStatus(message, type = '') {
            statusText.textContent = message;
            statusText.className = type ? 'card ' + type : 'card';
        }

        function speak(text) {
            // 取消之前的语音
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.volume = 1;
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }

        async function checkConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`, {
                    method: 'GET',
                    signal: AbortSignal.timeout(3000)
                });
                if (response.ok) {
                    connectionStatus.textContent = '已连接';
                    connectionStatus.className = 'connection-status online';
                    return true;
                }
            } catch (e) {
                connectionStatus.textContent = '未连接';
                connectionStatus.className = 'connection-status offline';
            }
            return false;
        }

        // ========== 获取位置 ==========
        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('浏览器不支持定位'));
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude.toFixed(6),
                            lng: position.coords.longitude.toFixed(6)
                        });
                    },
                    (error) => {
                        reject(error);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });
        }

        // ========== 智能助手 ==========
        assistantBtn.addEventListener('click', async () => {
            if (isListening) {
                stopRecognition();
                return;
            }
            
            // 检查连接
            const connected = await checkConnection();
            if (!connected) {
                updateStatus('❌ 无法连接到服务器，请检查后端是否启动', 'error');
                speak('无法连接到服务器，请检查网络或联系管理员');
                return;
            }
            
            startRecognition();
        });

        function startRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                updateStatus('❌ 您的浏览器不支持语音识别，请使用Chrome或Edge浏览器', 'error');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                assistantBtn.textContent = '停止录音';
                assistantBtn.classList.add('recording');
                updateStatus('🎙️ 正在录音，请说话...', 'processing');
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                updateStatus(`✅ 识别结果：${transcript}`, 'success');
                stopRecognition();
                
                // 发送到后端处理
                await sendToAssistant(transcript);
            };

            recognition.onerror = (event) => {
                let errorMsg = '语音识别出错';
                if (event.error === 'not-allowed') {
                    errorMsg = '麦克风权限被拒绝，请在浏览器设置中开启';
                }
                updateStatus(`❌ ${errorMsg}`, 'error');
                stopRecognition();
            };

            recognition.onend = () => {
                isListening = false;
                assistantBtn.textContent = '智能助手';
                assistantBtn.classList.remove('recording');
            };

            try {
                recognition.start();
                
                // 超时自动停止
                setTimeout(() => {
                    if (isListening) {
                        stopRecognition();
                        updateStatus('⏱️ 录音超时（1分钟），请重新点击', '');
                    }
                }, MAX_RECORD_TIME);
            } catch (err) {
                updateStatus('❌ 启动录音失败，请检查麦克风权限', 'error');
            }
        }

        function stopRecognition() {
            if (recognition && isListening) {
                recognition.stop();
            }
            isListening = false;
            assistantBtn.textContent = '智能助手';
            assistantBtn.classList.remove('recording');
        }

        async function sendToAssistant(text) {
            updateStatus('🤖 正在分析您的需求...', 'processing');
            
            try {
                // 尝试获取当前位置
                let position = null;
                try {
                    position = await getCurrentPosition();
                } catch (e) {
                    console.log('未获取到位置:', e.message);
                }
                
                const response = await fetch(`${API_BASE_URL}/api/assistant`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        elderly_id: elderlyId,
                        lat: position?.lat,
                        lng: position?.lng
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    updateStatus(`🤖 ${result.reply}`, 'success');
                    speak(result.reply);
                } else {
                    updateStatus(`❌ ${result.reply}`, 'error');
                    speak(result.reply);
                }
            } catch (error) {
                updateStatus('❌ 网络请求失败，请检查服务器连接', 'error');
                speak('网络请求失败，请稍后再试');
            }
        }

        // ========== SOS紧急求助 ==========
        sosBtn.addEventListener('click', async () => {
            // 确认弹窗
            const confirmed = confirm('确定要发送紧急求助吗？将向紧急联系人发送您的位置信息。');
            if (!confirmed) return;
            
            updateStatus('📍 正在获取位置...', 'processing');
            
            try {
                // 获取位置
                const position = await getCurrentPosition();
                updateStatus('📍 已获取位置，正在发送求助...', 'processing');
                
                // 发送SOS
                const response = await fetch(`${API_BASE_URL}/api/sos`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        lat: position.lat,
                        lng: position.lng,
                        elderly_id: elderlyId
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const message = `✅ 紧急求助已发送！\n位置：${result.location_text || '未知'}\n已通知 ${result.contacts_notified} 位紧急联系人`;
                    updateStatus(message, 'success');
                    speak(`紧急求助已发送，已通知${result.contacts_notified}位紧急联系人`);
                } else {
                    updateStatus(`❌ ${result.message}`, 'error');
                    speak(result.message);
                }
            } catch (error) {
                if (error.code === 1) {
                    updateStatus('❌ 位置权限被拒绝，请在浏览器设置中开启', 'error');
                    speak('无法获取位置，位置权限被拒绝');
                } else {
                    updateStatus('❌ 网络请求失败，请直接拨打110', 'error');
                    speak('网络请求失败，请直接拨打110');
                }
            }
        });

        // ========== 初始化 ==========
        // 检查登录状态
        if (!checkLogin()) {
            // 未登录，页面会跳转
        } else {
            // 定期检查连接
            setInterval(checkConnection, 30000);
            checkConnection();
        }
    </script>
</body>
</html>
